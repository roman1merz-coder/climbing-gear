<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Shoe Fit Preview</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f0e8; color: #2c3227; }

#shoe-fit-screen {
  width: 100vw; min-height: 100vh; min-height: 100dvh;
  background: #f5f0e8; overflow-y: auto;
  padding: 1.5rem; padding-bottom: max(2rem, env(safe-area-inset-bottom));
  text-align: center;
}
#shoe-fit-screen h2 {
  font-size: 1.25rem; font-weight: 800; margin-bottom: 0.3rem;
}
.shoe-fit-subtitle {
  font-size: 0.88rem; color: #7a7462; margin-bottom: 1.2rem; line-height: 1.5;
  max-width: 340px; margin-left: auto; margin-right: auto;
}

/* ── Personal info section ── */
.personal-info {
  max-width: 400px; margin: 0 auto 1.2rem;
  background: #fff; border-radius: 14px; padding: 14px;
  border: 1px solid #d5cdbf; text-align: left;
}
.personal-info-row {
  display: flex; gap: 10px; align-items: center;
}
.personal-info-row label {
  font-size: 0.78rem; color: #7a7462; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.3px;
  width: 70px; flex-shrink: 0; text-align: right;
}
.sex-options {
  display: flex; gap: 0; border: 1px solid #d5cdbf; border-radius: 8px; overflow: hidden;
  flex: 1;
}
.sex-option {
  flex: 1; min-height: 40px;
  display: flex; align-items: center; justify-content: center;
  padding: 6px 4px; text-align: center;
  font-size: 0.82rem; font-weight: 600; cursor: pointer;
  background: #faf8f4; color: #7a7462; border: none;
  border-right: 1px solid #d5cdbf; transition: all 0.15s;
  font-family: inherit; line-height: 1.2;
}
.sex-option:last-child { border-right: none; }
.sex-option.active { background: #c98a42; color: #fff; }
.sex-option:hover:not(.active) { background: #f0ebe1; }

.street-size-input {
  flex: 1; padding: 8px 10px; border: 1px solid #d5cdbf; border-radius: 8px;
  font-size: 0.85rem; font-family: inherit; background: #faf8f4; color: #2c3227;
  text-align: center; max-width: 100px;
}
.street-size-input::placeholder { color: #b8b0a0; }
.size-unit { font-size: 0.78rem; color: #7a7462; font-weight: 500; margin-left: 2px; }

/* ── Shoe entries ── */
.shoe-entries { max-width: 400px; margin: 0 auto 1rem; }
.shoe-card {
  background: #fff; border-radius: 14px; padding: 14px;
  margin-bottom: 10px; border: 1px solid #d5cdbf;
  text-align: left; position: relative;
}
.shoe-card-header {
  display: flex; gap: 8px; margin-bottom: 10px; align-items: center;
}
.shoe-number {
  background: #c98a42; color: #fff; width: 24px; height: 24px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
}
.shoe-selects { display: flex; gap: 8px; flex: 1; }
.shoe-selects select, .shoe-selects input {
  flex: 1; padding: 8px 10px; border: 1px solid #d5cdbf; border-radius: 8px;
  font-size: 0.85rem; font-family: inherit; background: #faf8f4; color: #2c3227;
  appearance: auto; min-width: 0;
}
.remove-shoe {
  position: absolute; top: 10px; right: 10px;
  background: none; border: none; color: #b8b0a0; font-size: 1.2rem;
  cursor: pointer; padding: 2px 6px; line-height: 1;
}
.remove-shoe:hover { color: #c98a42; }

/* ── Shoe size row ── */
.shoe-size-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.shoe-size-row label {
  font-size: 0.78rem; color: #7a7462; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.3px;
  width: 70px; flex-shrink: 0; text-align: right;
}
.shoe-size-input {
  padding: 8px 10px; border: 1px solid #d5cdbf; border-radius: 8px;
  font-size: 0.85rem; font-family: inherit; background: #faf8f4; color: #2c3227;
  width: 80px; text-align: center;
}
.shoe-size-input::placeholder { color: #b8b0a0; }

/* ── Fit ratings ── */
.fit-ratings { display: flex; flex-direction: column; gap: 8px; }
.fit-group { display: flex; align-items: center; gap: 10px; }
.fit-label {
  font-size: 0.78rem; color: #7a7462; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.3px;
  width: 70px; flex-shrink: 0; text-align: right;
}
.fit-options {
  display: flex; gap: 0; border: 1px solid #d5cdbf; border-radius: 8px; overflow: hidden;
  flex: 1;
}
.fit-option {
  width: 33.33%; flex: none; min-height: 44px;
  display: flex; align-items: center; justify-content: center;
  padding: 6px 4px; text-align: center;
  font-size: 0.75rem; font-weight: 600; cursor: pointer;
  background: #faf8f4; color: #7a7462; border: none;
  border-right: 1px solid #d5cdbf; transition: all 0.15s;
  font-family: inherit; line-height: 1.2;
}
.fit-option:last-child { border-right: none; }
.fit-option.active { background: #c98a42; color: #fff; }
.fit-option:hover:not(.active) { background: #f0ebe1; }

.add-shoe-btn {
  background: none; border: 2px dashed #d5cdbf; border-radius: 12px;
  padding: 12px; width: 100%; max-width: 400px;
  font-size: 0.9rem; color: #7a7462; cursor: pointer;
  font-family: inherit; font-weight: 600; margin-bottom: 1.2rem;
  transition: border-color 0.2s;
}
.add-shoe-btn:hover { border-color: #c98a42; color: #c98a42; }
.shoe-fit-buttons { max-width: 400px; margin: 0 auto; display: flex; gap: 10px; }
.btn-skip {
  flex: 1; background: #fff; color: #7a7462; border: 1px solid #d5cdbf;
  padding: 14px; border-radius: 10px; font-size: 1rem; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.btn-next {
  flex: 2; background: #c98a42; color: #fff; border: none;
  padding: 14px; border-radius: 10px; font-size: 1rem; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
</style>
</head>
<body>

<div id="shoe-fit-screen">
  <h2>Which shoes fit you well?</h2>
  <p class="shoe-fit-subtitle">
    Tell us about shoes you currently climb in. This helps us improve our size recommendations.
  </p>

  <!-- Sex + street shoe size -->
  <div class="personal-info">
    <div class="personal-info-row" style="margin-bottom: 10px;">
      <label>Sex</label>
      <div class="sex-options" id="sex-options">
        <button class="sex-option" data-val="male">Male</button>
        <button class="sex-option" data-val="female">Female</button>
      </div>
    </div>
    <div class="personal-info-row">
      <label>Street size</label>
      <input type="number" class="street-size-input" id="street-size" placeholder="42" step="0.5" min="30" max="55">
      <span class="size-unit">EU</span>
    </div>
  </div>

  <div class="shoe-entries" id="shoe-entries">
    <div class="shoe-card" data-index="0">
      <button class="remove-shoe" title="Remove">&times;</button>
      <div class="shoe-card-header">
        <span class="shoe-number">1</span>
        <div class="shoe-selects">
          <select class="brand-select"><option value="">Brand...</option></select>
          <select class="model-select" disabled><option value="">Model...</option></select>
        </div>
      </div>
      <!-- Climbing shoe size -->
      <div class="shoe-size-row">
        <label>Size</label>
        <input type="number" class="shoe-size-input" placeholder="39" step="0.5" min="25" max="55">
        <span class="size-unit">EU</span>
      </div>
      <div class="fit-ratings">
        <div class="fit-group">
          <div class="fit-label">Toes</div>
          <div class="fit-options" data-area="toes">
            <button class="fit-option" data-val="squeezed">Squeezed</button>
            <button class="fit-option" data-val="perfect">Perfect</button>
            <button class="fit-option" data-val="roomy">Too roomy</button>
          </div>
        </div>
        <div class="fit-group">
          <div class="fit-label">Forefoot</div>
          <div class="fit-options" data-area="forefoot">
            <button class="fit-option" data-val="tight">Tight</button>
            <button class="fit-option" data-val="perfect">Perfect</button>
            <button class="fit-option" data-val="loose">Loose</button>
          </div>
        </div>
        <div class="fit-group">
          <div class="fit-label">Heel</div>
          <div class="fit-options" data-area="heel">
            <button class="fit-option" data-val="tight">Tight</button>
            <button class="fit-option" data-val="perfect">Perfect</button>
            <button class="fit-option" data-val="empty">Empty space</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button class="add-shoe-btn" id="add-shoe-btn">+ Add another shoe</button>

  <div class="shoe-fit-buttons">
    <button class="btn-skip" id="skip-fit-btn">Skip</button>
    <button class="btn-next" id="next-fit-btn">Continue</button>
  </div>
</div>

<script>
/* Sex toggle */
document.getElementById('sex-options').addEventListener('click', e => {
  if (!e.target.classList.contains('sex-option')) return;
  document.querySelectorAll('.sex-option').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
});

/* Fit option toggle */
document.addEventListener('click', e => {
  if (!e.target.classList.contains('fit-option')) return;
  const group = e.target.closest('.fit-options');
  group.querySelectorAll('.fit-option').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
});

/* Remove shoe */
document.addEventListener('click', e => {
  if (!e.target.classList.contains('remove-shoe')) return;
  const card = e.target.closest('.shoe-card');
  if (document.querySelectorAll('.shoe-card').length > 1) {
    card.remove();
    renumberShoes();
  }
});

function renumberShoes() {
  document.querySelectorAll('.shoe-card').forEach((card, i) => {
    card.dataset.index = i;
    card.querySelector('.shoe-number').textContent = i + 1;
  });
}

/* Add shoe */
document.getElementById('add-shoe-btn').addEventListener('click', () => {
  const entries = document.getElementById('shoe-entries');
  const idx = entries.children.length;
  const card = document.createElement('div');
  card.className = 'shoe-card';
  card.dataset.index = idx;
  card.innerHTML = `
    <button class="remove-shoe" title="Remove">&times;</button>
    <div class="shoe-card-header">
      <span class="shoe-number">${idx + 1}</span>
      <div class="shoe-selects">
        <select class="brand-select"><option value="">Brand...</option></select>
        <select class="model-select" disabled><option value="">Model...</option></select>
      </div>
    </div>
    <div class="shoe-size-row">
      <label>Size</label>
      <input type="number" class="shoe-size-input" placeholder="39" step="0.5" min="25" max="55">
      <span class="size-unit">EU</span>
    </div>
    <div class="fit-ratings">
      <div class="fit-group">
        <div class="fit-label">Toes</div>
        <div class="fit-options" data-area="toes">
          <button class="fit-option" data-val="squeezed">Squeezed</button>
          <button class="fit-option" data-val="perfect">Perfect</button>
          <button class="fit-option" data-val="roomy">Too roomy</button>
        </div>
      </div>
      <div class="fit-group">
        <div class="fit-label">Forefoot</div>
        <div class="fit-options" data-area="forefoot">
          <button class="fit-option" data-val="tight">Tight</button>
          <button class="fit-option" data-val="perfect">Perfect</button>
          <button class="fit-option" data-val="loose">Loose</button>
        </div>
      </div>
      <div class="fit-group">
        <div class="fit-label">Heel</div>
        <div class="fit-options" data-area="heel">
          <button class="fit-option" data-val="tight">Tight</button>
          <button class="fit-option" data-val="perfect">Perfect</button>
          <button class="fit-option" data-val="empty">Empty space</button>
        </div>
      </div>
    </div>
  `;
  entries.appendChild(card);
});
</script>
</body>
</html>
