<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foot Scan Admin</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f3ef; color: #2d2a26; padding: 20px; }
h1 { font-size: 1.4rem; margin-bottom: 16px; }
.stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.stat-card { background: #fff; border-radius: 10px; padding: 14px 18px; border: 1px solid #d5cdbf; min-width: 120px; }
.stat-card .num { font-size: 1.6rem; font-weight: 700; color: #3d7a52; }
.stat-card .label { font-size: 0.75rem; color: #888; margin-top: 2px; }
.scan-card { background: #fff; border-radius: 12px; border: 1px solid #d5cdbf; margin-bottom: 16px; overflow: hidden; }
.scan-header { padding: 14px 16px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.scan-header .scan-id { font-weight: 600; font-size: 0.85rem; }
.scan-header .scan-date { font-size: 0.8rem; color: #888; }
.scan-header .scan-email { font-size: 0.85rem; color: #3d7a52; font-weight: 500; }
.scan-body { padding: 14px 16px; display: flex; gap: 16px; flex-wrap: wrap; }
.scan-photos { display: flex; gap: 8px; flex-shrink: 0; }
.scan-photos img { width: 120px; height: 160px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; }
.scan-photos img:hover { opacity: 0.85; }
.scan-info { flex: 1; min-width: 200px; }
.info-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 0.85rem; }
.info-label { color: #888; min-width: 90px; }
.info-val { font-weight: 500; }
.shoe-list { margin-top: 10px; }
.shoe-item { background: #f9f7f4; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; font-size: 0.82rem; }
.shoe-item .shoe-name { font-weight: 600; margin-bottom: 4px; }
.shoe-item .shoe-fit { color: #666; }
.fit-tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 0.75rem; margin-right: 4px; }
.fit-tight { background: #fde8e8; color: #c0392b; }
.fit-perfect { background: #e8f5e9; color: #27ae60; }
.fit-loose, .fit-empty { background: #e8eaf6; color: #5c6bc0; }
.no-data { text-align: center; padding: 40px; color: #999; }
.loading { text-align: center; padding: 40px; color: #888; }
.photos-only { background: #fff8e1; }
.analysis { margin-top: 10px; padding: 10px 12px; background: #f0f7f2; border-radius: 8px; font-size: 0.82rem; }
.analysis .a-title { font-weight: 600; margin-bottom: 4px; color: #3d7a52; }
.analysis .a-row { display: flex; flex-wrap: wrap; gap: 4px 14px; }
.analysis .a-item { white-space: nowrap; }
.analysis .a-label { color: #888; }
.no-analysis { color: #bbb; font-size: 0.8rem; font-style: italic; margin-top: 8px; }
@media (max-width: 600px) {
  .scan-photos img { width: 80px; height: 110px; }
  .scan-body { flex-direction: column; }
}
</style>
</head>
<body>
<h1>Foot Scan Admin</h1>
<div class="stats" id="stats"></div>
<div id="scans-container"><div class="loading">Loading scans...</div></div>

<script>
const SB_URL = 'https://wsjsuhvpgupalwgcjatp.supabase.co';

</body>
</html>
<script>
const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };

async function loadData() {
  const [fitsRes, photosRes] = await Promise.all([
    fetch(`${SB_URL}/rest/v1/foot_scan_fits?select=*&order=created_at.desc`, { headers }),
    fetch(`${SB_URL}/storage/v1/object/list/foot-scans`, {
      method: 'POST', headers: { ...headers, 'Content-Type': 'application/json' },
      body: JSON.stringify({ prefix: 'scans/', limit: 500, offset: 0, sortBy: { column: 'created_at', order: 'desc' } })
    })
  ]);

  const fits = await fitsRes.json();
  const photoFiles = await photosRes.json();

  // Group photos by scan ID
  const photoMap = {};
  for (const f of photoFiles) {
    if (!f.name || !f.name.startsWith('scan-')) continue;
    // scan-2026-03-05T13-35-21-sole.jpg -> scan-2026-03-05T13-35-21
    const parts = f.name.replace(/\.(jpg|jpeg|png)$/i, '').split('-');
    const type = parts.pop(); // sole or side
    const scanId = parts.join('-');
    if (!photoMap[scanId]) photoMap[scanId] = { sole: null, side: null, created: f.created_at };
    photoMap[scanId][type] = `${SB_URL}/storage/v1/object/public/foot-scans/scans/${f.name}`;
  }

  // Group fits by scan_id
  const fitMap = {};
  for (const f of fits) {
    fitMap[f.scan_id] = f;
  }

  // Merge: all scan IDs from both sources
  const allIds = new Set([...Object.keys(photoMap), ...Object.keys(fitMap)]);
  const merged = [];
  for (const id of allIds) {
    merged.push({
      scanId: id,
      photos: photoMap[id] || null,
      fit: fitMap[id] || null,
      date: fitMap[id]?.created_at || photoMap[id]?.created || null
    });
  }
  merged.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

  // Stats
  const totalScans = merged.length;
  const withEmail = merged.filter(m => m.fit?.email).length;
  const withShoes = merged.filter(m => m.fit?.shoes?.length > 0).length;
  const photosOnly = merged.filter(m => m.photos && !m.fit).length;

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="num">${totalScans}</div><div class="label">Total Scans</div></div>
    <div class="stat-card"><div class="num">${withEmail}</div><div class="label">With Email</div></div>
    <div class="stat-card"><div class="num">${withShoes}</div><div class="label">With Shoe Data</div></div>
    <div class="stat-card"><div class="num">${photosOnly}</div><div class="label">Photos Only</div></div>
  `;

  if (merged.length === 0) {
    document.getElementById('scans-container').innerHTML = '<div class="no-data">No scans yet</div>';
    return;
  }

  document.getElementById('scans-container').innerHTML = merged.map(m => renderScan(m)).join('');
}

function fmtDate(iso) {
  if (!iso) return '--';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
    + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

function fitTag(val) {
  if (!val || val === 'empty') return '<span class="fit-tag fit-empty">empty</span>';
  const cls = val === 'perfect' ? 'fit-perfect' : val === 'tight' ? 'fit-tight' : 'fit-loose';
  return `<span class="fit-tag ${cls}">${val}</span>`;
}

function renderScan(m) {
  const hasPhotos = m.photos;
  const hasFit = m.fit;
  const isPhotosOnly = hasPhotos && !hasFit;

  let photosHtml = '';
  if (hasPhotos) {
    photosHtml = '<div class="scan-photos">';
    if (m.photos.sole) photosHtml += `<img src="${m.photos.sole}" alt="Sole" onclick="window.open(this.src)" title="Sole">`;
    if (m.photos.side) photosHtml += `<img src="${m.photos.side}" alt="Side" onclick="window.open(this.src)" title="Side">`;
    photosHtml += '</div>';
  }

  let infoHtml = '';
  if (hasFit) {
    infoHtml += `<div class="info-row"><span class="info-label">Sex:</span><span class="info-val">${m.fit.sex || '--'}</span></div>`;
    infoHtml += `<div class="info-row"><span class="info-label">Street size:</span><span class="info-val">${m.fit.street_size_eu || '--'} EU</span></div>`;

    if (m.fit.shoes && m.fit.shoes.length > 0) {
      infoHtml += '<div class="shoe-list">';
      for (const s of m.fit.shoes) {
        infoHtml += `<div class="shoe-item">
          <div class="shoe-name">${s.brand || '?'} ${s.model || '?'} ${s.size_eu ? '(EU ' + s.size_eu + ')' : ''}</div>
          <div class="shoe-fit">Toes: ${fitTag(s.fit?.toes)} Forefoot: ${fitTag(s.fit?.forefoot)} Heel: ${fitTag(s.fit?.heel)}</div>
        </div>`;
      }
      infoHtml += '</div>';
    }
    // Analysis results
    if (m.fit.toe_shape || m.fit.width_ratio || m.fit.arch_ratio) {
      infoHtml += `<div class="analysis">
        <div class="a-title">Analysis Results</div>
        <div class="a-row">
          ${m.fit.toe_shape ? `<span class="a-item"><span class="a-label">Toe:</span> ${m.fit.toe_shape}${m.fit.toe_confidence ? ' (' + (m.fit.toe_confidence * 100).toFixed(0) + '%)' : ''}</span>` : ''}
          ${m.fit.width_ratio ? `<span class="a-item"><span class="a-label">Width:</span> ${m.fit.width_ratio}${m.fit.width ? ' (' + m.fit.width + ')' : ''}</span>` : ''}
          ${m.fit.heel_ratio ? `<span class="a-item"><span class="a-label">Heel:</span> ${m.fit.heel_ratio}${m.fit.heel_width ? ' (' + m.fit.heel_width + ')' : ''}</span>` : ''}
          ${m.fit.arch_ratio ? `<span class="a-item"><span class="a-label">Arch:</span> ${m.fit.arch_ratio}</span>` : ''}
          ${m.fit.instep_ratio ? `<span class="a-item"><span class="a-label">Instep:</span> ${m.fit.instep_ratio}</span>` : ''}
          ${m.fit.volume ? `<span class="a-item"><span class="a-label">Volume:</span> ${m.fit.volume}</span>` : ''}
          ${m.fit.confidence ? `<span class="a-item"><span class="a-label">Conf:</span> ${m.fit.confidence}</span>` : ''}
        </div>
        ${m.fit.notes ? `<div style="margin-top:4px;color:#666">${m.fit.notes}</div>` : ''}
      </div>`;
    } else {
      infoHtml += '<div class="no-analysis">Not yet analyzed</div>';
    }
  } else {
    infoHtml = '<div style="color:#999;font-size:0.85rem">Photos uploaded, no shoe fit data submitted</div>';
  }

  return `<div class="scan-card ${isPhotosOnly ? 'photos-only' : ''}">
    <div class="scan-header">
      <a class="scan-id" href="/scan/${m.scanId}" target="_blank" style="color:#3d7a52;text-decoration:none" title="Open scan results page">${m.scanId || 'unknown'}</a>
      <span class="scan-date">${fmtDate(m.date)}</span>
      ${hasFit && m.fit.email ? `<span class="scan-email">${m.fit.email}</span>` : ''}
      ${hasFit && m.fit.recommendations ? '<span style="background:#e8f5e9;color:#27ae60;padding:2px 8px;border-radius:4px;font-size:0.72rem;font-weight:600">✓ Recs</span>' : ''}
      ${hasFit && m.fit.interpretation ? '<span style="background:#e8eaf6;color:#5c6bc0;padding:2px 8px;border-radius:4px;font-size:0.72rem;font-weight:600">✓ Report</span>' : ''}
    </div>
    <div class="scan-body">${photosHtml}<div class="scan-info">${infoHtml}</div></div>
  </div>`;
}

loadData().catch(e => {
  console.error(e);
  document.getElementById('scans-container').innerHTML = '<div class="no-data">Error loading data</div>';
});

// Auto-refresh every 30 seconds
setInterval(() => loadData().catch(console.error), 30000);
</script>
