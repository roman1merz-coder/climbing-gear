<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suggestion Hub Admin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f3ef;
            color: #2d2a26;
            padding: 20px;
        }

        h1 { font-size: 1.4rem; margin-bottom: 16px; }

        /* ── Stats row ── */
        .stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card {
            background: #fff; border-radius: 10px; padding: 14px 18px;
            border: 1px solid #d5cdbf; min-width: 110px; cursor: pointer;
            transition: box-shadow .15s;
        }
        .stat-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
        .stat-card.active { border-color: #3d7a52; box-shadow: 0 0 0 2px rgba(61,122,82,.25); }
        .stat-card .num { font-size: 1.6rem; font-weight: 700; color: #3d7a52; }
        .stat-card .label { font-size: .75rem; color: #888; margin-top: 2px; }

        /* ── Suggestion card ── */
        .suggestion-card {
            background: #fff; border-radius: 12px; border: 1px solid #d5cdbf;
            margin-bottom: 14px; overflow: hidden;
        }
        .suggestion-header {
            padding: 12px 16px; border-bottom: 1px solid #eee;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 8px;
        }
        .suggestion-header .sg-id {
            font-family: 'SF Mono', Menlo, monospace; font-size: .78rem;
            color: #999; font-weight: 500;
        }
        .suggestion-header .sg-date { font-size: .8rem; color: #888; }

        .type-badge {
            display: inline-block; padding: 2px 10px; border-radius: 4px;
            font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .3px;
        }
        .type-bug     { background: #fde8e8; color: #c0392b; }
        .type-feature  { background: #e8f5e9; color: #27ae60; }
        .type-general  { background: #e8eaf6; color: #5c6bc0; }
        .type-data     { background: #fff3e0; color: #e67e22; }

        .status-badge {
            display: inline-block; padding: 2px 10px; border-radius: 4px;
            font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .3px;
        }
        .status-new        { background: #e3f2fd; color: #1976d2; }
        .status-in-progress { background: #fff3e0; color: #e67e22; }
        .status-done       { background: #e8f5e9; color: #27ae60; }
        .status-wont-fix   { background: #f5f5f5; color: #999; }

        .suggestion-body { padding: 14px 16px; }
        .sg-message {
            font-size: .88rem; line-height: 1.5; white-space: pre-wrap;
            margin-bottom: 10px;
        }
        .sg-url {
            font-size: .78rem; color: #3d7a52; word-break: break-all;
            text-decoration: none;
        }
        .sg-url:hover { text-decoration: underline; }

        /* ── Admin actions ── */
        .sg-actions {
            padding: 10px 16px; border-top: 1px solid #f0ede8;
            display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
        }
        .sg-actions select {
            font-size: .82rem; padding: 5px 10px; border-radius: 6px;
            border: 1px solid #d5cdbf; background: #fff; cursor: pointer;
        }
        .sg-actions input[type="text"] {
            flex: 1; min-width: 200px; font-size: .82rem; padding: 5px 10px;
            border-radius: 6px; border: 1px solid #d5cdbf;
        }
        .sg-actions button {
            font-size: .82rem; padding: 5px 14px; border-radius: 6px;
            border: 1px solid #3d7a52; background: #3d7a52; color: #fff;
            cursor: pointer; font-weight: 500;
        }
        .sg-actions button:hover { background: #2e6140; }
        .sg-actions .saved-msg {
            font-size: .75rem; color: #27ae60; font-weight: 500;
            opacity: 0; transition: opacity .3s;
        }
        .sg-actions .saved-msg.show { opacity: 1; }

        .admin-notes-display {
            margin-top: 8px; padding: 8px 12px; background: #f9f7f4;
            border-radius: 8px; font-size: .82rem; color: #555;
        }
        .admin-notes-display .notes-label {
            font-weight: 600; color: #888; font-size: .72rem;
            text-transform: uppercase; letter-spacing: .3px; margin-bottom: 2px;
        }

        .loading { text-align: center; padding: 40px; color: #888; }
        .no-data { text-align: center; padding: 40px; color: #999; }

        @media (max-width: 600px) {
            .sg-actions { flex-direction: column; }
            .sg-actions input[type="text"] { min-width: unset; width: 100%; }
        }
    </style>
</head>
<body>
    <h1>Suggestion Hub Admin</h1>
    <div id="stats" class="stats"></div>
    <div id="suggestions-container" class="loading">Loading suggestions…</div>

    <script>
        const SB_URL = 'https://wsjsuhvpgupalwgcjatp.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndzanN1aHZwZ3VwYWx3Z2NqYXRwIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MDU2MDc5MSwiZXhwIjoyMDg2MTM2NzkxfQ.6cYE1ElsvX7-BTc1DD15zoPJyr4L3bN0_QyKRQmp3M4';
        const headers = {
            'apikey': SB_KEY,
            'Authorization': `Bearer ${SB_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
        };

        let allSuggestions = [];
        let activeFilter = null; // null = all

        async function loadData() {
            const res = await fetch(
                `${SB_URL}/rest/v1/feedback?select=*&order=created_at.desc`,
                { headers }
            );
            allSuggestions = await res.json();
            renderStats();
            renderList();
        }

        function renderStats() {
            const total = allSuggestions.length;
            const newCount = allSuggestions.filter(s => s.status === 'new').length;
            const inProg  = allSuggestions.filter(s => s.status === 'in-progress').length;
            const done    = allSuggestions.filter(s => s.status === 'done').length;
            const bugs    = allSuggestions.filter(s => s.type === 'bug').length;
            const feats   = allSuggestions.filter(s => s.type === 'feature').length;

            const cards = [
                { key: null,          num: total,    label: 'Total' },
                { key: 'status:new',  num: newCount, label: 'New' },
                { key: 'status:in-progress', num: inProg, label: 'In Progress' },
                { key: 'status:done', num: done,     label: 'Done' },
                { key: 'type:bug',    num: bugs,     label: 'Bugs' },
                { key: 'type:feature',num: feats,    label: 'Features' },
            ];

            document.getElementById('stats').innerHTML = cards.map(c =>
                `<div class="stat-card ${activeFilter === c.key ? 'active' : ''}"
                      onclick="setFilter(${c.key === null ? 'null' : "'" + c.key + "'"})">
                    <div class="num">${c.num}</div>
                    <div class="label">${c.label}</div>
                </div>`
            ).join('');
        }

        function setFilter(key) {
            activeFilter = activeFilter === key ? null : key;
            renderStats();
            renderList();
        }

        function getFiltered() {
            if (!activeFilter) return allSuggestions;
            const [field, val] = activeFilter.split(':');
            return allSuggestions.filter(s => s[field] === val);
        }

        function renderList() {
            const items = getFiltered();
            if (items.length === 0) {
                document.getElementById('suggestions-container').innerHTML =
                    '<div class="no-data">No suggestions match this filter</div>';
                return;
            }
            document.getElementById('suggestions-container').innerHTML =
                items.map((s, i) => renderCard(s, i)).join('');
        }

        function fmtDate(iso) {
            if (!iso) return '--';
            const d = new Date(iso);
            return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
                + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        }

        function shortId(uuid) {
            return '#' + uuid.slice(0, 8).toUpperCase();
        }

        function renderCard(s, idx) {
            const typeClass = 'type-' + (s.type || 'general');
            const statusClass = 'status-' + (s.status || 'new');

            return `<div class="suggestion-card" id="card-${s.id}">
                <div class="suggestion-header">
                    <span class="sg-id">${shortId(s.id)}</span>
                    <span class="type-badge ${typeClass}">${s.type || 'general'}</span>
                    <span class="status-badge ${statusClass}">${(s.status || 'new').replace('-', ' ')}</span>
                    <span class="sg-date">${fmtDate(s.created_at)}</span>
                </div>
                <div class="suggestion-body">
                    <div class="sg-message">${escHtml(s.message || '(empty)')}</div>
                    ${s.page_url ? `<a class="sg-url" href="${escHtml(s.page_url)}" target="_blank">${escHtml(s.page_url)}</a>` : ''}
                    ${s.admin_notes ? `<div class="admin-notes-display"><div class="notes-label">Admin Notes</div>${escHtml(s.admin_notes)}</div>` : ''}
                </div>
                <div class="sg-actions">
                    <select id="status-${s.id}" onchange="markDirty('${s.id}')">
                        <option value="new"         ${s.status === 'new'         ? 'selected' : ''}>New</option>
                        <option value="in-progress"  ${s.status === 'in-progress' ? 'selected' : ''}>In Progress</option>
                        <option value="done"         ${s.status === 'done'        ? 'selected' : ''}>Done</option>
                        <option value="wont-fix"     ${s.status === 'wont-fix'    ? 'selected' : ''}>Won't Fix</option>
                    </select>
                    <input type="text" id="notes-${s.id}" placeholder="Admin notes…"
                           value="${escAttr(s.admin_notes || '')}"
                           onkeydown="if(event.key==='Enter') saveItem('${s.id}')"
                           oninput="markDirty('${s.id}')">
                    <button id="btn-${s.id}" onclick="saveItem('${s.id}')">Save</button>
                    <span class="saved-msg" id="msg-${s.id}">✓ Saved</span>
                </div>
            </div>`;
        }

        function escHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
        function escAttr(str) {
            return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function markDirty(id) {
            const btn = document.getElementById('btn-' + id);
            if (btn) btn.style.background = '#e67e22';
        }

        async function saveItem(id) {
            const status = document.getElementById('status-' + id).value;
            const notes  = document.getElementById('notes-' + id).value.trim();
            const btn    = document.getElementById('btn-' + id);
            const msg    = document.getElementById('msg-' + id);

            btn.textContent = '…';
            btn.disabled = true;

            try {
                await fetch(`${SB_URL}/rest/v1/feedback?id=eq.${id}`, {
                    method: 'PATCH',
                    headers,
                    body: JSON.stringify({ status, admin_notes: notes || null })
                });

                // Update local data
                const item = allSuggestions.find(s => s.id === id);
                if (item) { item.status = status; item.admin_notes = notes || null; }

                btn.textContent = 'Save';
                btn.disabled = false;
                btn.style.background = '#3d7a52';
                msg.classList.add('show');
                setTimeout(() => msg.classList.remove('show'), 2000);

                renderStats();
            } catch (e) {
                console.error(e);
                btn.textContent = 'Error';
                btn.disabled = false;
                btn.style.background = '#c0392b';
            }
        }

        loadData().catch(e => {
            console.error(e);
            document.getElementById('suggestions-container').innerHTML =
                '<div class="no-data">Error loading suggestions</div>';
        });

        // Auto-refresh every 60s
        setInterval(() => loadData().catch(console.error), 60000);
    </script>
</body>
</html>
